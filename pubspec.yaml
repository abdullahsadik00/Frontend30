name: frontend30
description: A 30-day frontend interview preparation curriculum app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.7.3
  shared_preferences: ^2.3.2
  confetti: ^0.7.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum_data.json
